<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camisas do Santa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E;
    --dark-red: #8B0A1E;
    --black: #0D0D0D;
    --off-white: #F5F0EB;
    --gray: #888;
    --light-gray: #E8E3DC;
    --card-bg: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--off-white);
    font-family: 'DM Sans', sans-serif;
    color: var(--black);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--black);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--red);
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    color: #fff;
    letter-spacing: 2px;
  }

  header h1 span {
    color: var(--red);
  }

  /* MAIN */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  .catalog-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .catalog-meta h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    color: var(--gray);
  }

  .product-count {
    font-size: 0.85rem;
    color: var(--gray);
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 24px;
  }

  /* EMPTY / LOADING STATE */
  .empty,
  .loading {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--gray);
  }
  .empty svg,
  .loading svg { margin-bottom: 16px; opacity: 0.3; }
  .empty p { font-size: 1.1rem; margin-bottom: 8px; }
  .empty small { font-size: 0.85rem; }
  .loading p { font-size: 0.95rem; }

  /* CARD */
  .card {
    background: var(--card-bg);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.14); }

  .card-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    background: var(--light-gray);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray);
    font-size: 0.8rem;
  }
  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .no-img-wrapper {
    width: 100%;
    aspect-ratio: 1/1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: #aaa;
  }
  .no-img-wrapper svg { opacity: 0.4; }
  .no-img-wrapper span { font-size: 0.75rem; }

  .card-body {
    padding: 16px;
  }

  .card-name {
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .card-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--red);
    letter-spacing: 1px;
  }

  .card-price.combinado {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--red);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .card-description {
    font-size: 0.85rem;
    color: var(--gray);
    margin-top: 6px;
    min-height: 1.2em;
  }
</style>
</head>
<body>

<header>
  <h1>Camisas <span>do Santa</span></h1>
</header>

<main>
  <div class="catalog-meta">
    <h2>Catálogo</h2>
    <span class="product-count" id="count">—</span>
  </div>
  <div class="grid" id="grid">
    <div class="loading">
      <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <p>Carregando produtos...</p>
    </div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://wmbsocblslwsaofyrilk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtYnNvY2Jsc2x3c2FvZnlyaWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzczMjgsImV4cCI6MjA4ODA1MzMyOH0.xXdJ7pRKKFNtfHLgbMcYJH_kKjnUirC6KFP2XOh0M_w';

  const api = (path, opts = {}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      ...(opts.headers || {})
    },
    ...opts
  });

  let products = [];

  function formatPrice(v) {
    return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function render() {
    const grid = document.getElementById('grid');
    const count = document.getElementById('count');

    count.textContent = products.length + ' produto' + (products.length !== 1 ? 's' : '');

    if (products.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <p>Nenhum produto disponível no momento.</p>
          <small>Volte mais tarde para ver novidades.</small>
        </div>`;
      return;
    }

    grid.innerHTML = products.map(p => {
      const hasPrice = p.price !== null && p.price !== undefined && p.price !== '';
      const priceHtml = hasPrice
        ? `<div class="card-price">${formatPrice(p.price)}</div>`
        : `<div class="card-price combinado">Preço à combinar</div>`;
      const descriptionHtml = p.description
        ? `<div class="card-description">${p.description}</div>`
        : `<div class="card-description"></div>`;

      return `
      <div class="card">
        <div class="card-img">
          ${
            p.img
              ? `<img src="${p.img}" alt="${p.name}">`
              : `<div class="no-img-wrapper">
                   <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
                     <rect x="3" y="3" width="18" height="18" rx="2"/>
                     <circle cx="8.5" cy="8.5" r="1.5"/>
                     <path d="M21 15l-5-5L5 21"/>
                   </svg>
                   <span>Sem foto</span>
                 </div>`
          }
        </div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          ${priceHtml}
          ${descriptionHtml}
        </div>
      </div>`;
    }).join('');
  }

  async function loadProducts() {
    try {
      const res = await api('products?order=created_at.desc');
      if (!res.ok) throw new Error('Erro ao buscar produtos');
      products = await res.json();
      render();
    } catch (err) {
      console.error(err);
      const grid = document.getElementById('grid');
      grid.innerHTML = `
        <div class="empty">
          <p>Não foi possível carregar os produtos.</p>
          <small>Tente novamente mais tarde.</small>
        </div>`;
      document.getElementById('count').textContent = '—';
    }
  }

  document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
