<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Camisas do Santa</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E;
    --dark-red: #8B0A1E;
    --black: #0D0D0D;
    --off-white: #F5F0EB;
    --gray: #888;
    --light-gray: #E8E3DC;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--off-white); font-family: 'DM Sans', sans-serif; color: var(--black); min-height: 100vh; }

  header {
    background: var(--black);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--red);
  }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: #fff; letter-spacing: 2px; }
  header h1 span { color: var(--red); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .share-link {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 3px;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .share-link:hover { border-color: var(--red); }
  .share-link span { font-size: 0.78rem; color: var(--gray); letter-spacing: 0.5px; text-transform: uppercase; }
  .share-link code { font-size: 0.78rem; color: #aaa; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .copy-btn { background: var(--red); border: none; color: #fff; padding: 4px 10px; font-size: 0.7rem; font-weight: 600; cursor: pointer; border-radius: 2px; font-family: 'DM Sans', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
  .btn-add { background: var(--red); color: #fff; border: none; padding: 10px 24px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; transition: background 0.2s; border-radius: 2px; }
  .btn-add:hover { background: var(--dark-red); }

  main { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
  .catalog-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .catalog-meta h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; color: var(--gray); }
  .product-count { font-size: 0.85rem; color: var(--gray); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }

  .empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--gray); }
  .empty p { font-size: 1.1rem; margin-bottom: 8px; margin-top: 16px; }
  .empty small { font-size: 0.85rem; }

  .loading { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--gray); font-size: 0.9rem; }

  .card { background: #fff; border-radius: 4px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.14); }
  .card-img { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: var(--light-gray); display: flex; align-items: center; justify-content: center; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .no-img-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; color: #ccc; font-size: 0.75rem; }
  .card-body { padding: 16px; }
  .card-name { font-weight: 600; font-size: 1rem; margin-bottom: 6px; line-height: 1.3; }
  .card-price { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--red); letter-spacing: 1px; }
  .card-actions { display: flex; border-top: 1px solid var(--light-gray); }
  .card-actions button { flex: 1; background: none; border: none; padding: 10px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; transition: background 0.15s; }
  .btn-edit { color: var(--black); }
  .btn-edit:hover { background: var(--light-gray); }
  .btn-delete { color: var(--red); border-left: 1px solid var(--light-gray) !important; }
  .btn-delete:hover { background: #FFF0F2; }

  /* MODAL */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 6px; width: 100%; max-width: 460px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { background: var(--black); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: #fff; letter-spacing: 2px; }
  .btn-close { background: none; border: none; color: var(--gray); cursor: pointer; font-size: 1.4rem; line-height: 1; transition: color 0.15s; }
  .btn-close:hover { color: #fff; }
  .modal-body { padding: 28px 24px; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--gray); margin-bottom: 6px; }
  .field input[type="text"], .field input[type="number"] { width: 100%; border: 2px solid var(--light-gray); border-radius: 3px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--black); transition: border-color 0.15s; outline: none; }
  .field input:focus { border-color: var(--red); }
  .img-upload-area { border: 2px dashed var(--light-gray); border-radius: 3px; cursor: pointer; transition: border-color 0.15s, background 0.15s; overflow: hidden; position: relative; }
  .img-upload-area:hover { border-color: var(--red); background: #FFF8F9; }
  .img-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .img-placeholder { padding: 28px; text-align: center; color: var(--gray); }
  .img-placeholder span { font-size: 0.85rem; display: block; margin-top: 8px; }
  .img-preview { display: none; width: 100%; height: 180px; object-fit: cover; }
  .img-preview.visible { display: block; }
  .modal-footer { padding: 16px 24px; background: var(--off-white); display: flex; gap: 12px; justify-content: flex-end; }
  .btn-cancel { background: none; border: 2px solid var(--light-gray); padding: 10px 22px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; border-radius: 2px; color: var(--black); transition: border-color 0.15s; }
  .btn-cancel:hover { border-color: var(--gray); }
  .btn-save { background: var(--red); border: none; padding: 10px 28px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; color: #fff; cursor: pointer; border-radius: 2px; letter-spacing: 0.5px; transition: background 0.15s; }
  .btn-save:hover { background: var(--dark-red); }
  .btn-save:disabled { background: #ccc; cursor: not-allowed; }

  .confirm-modal { background: #fff; border-radius: 6px; width: 100%; max-width: 360px; padding: 32px 28px; text-align: center; animation: slideUp 0.2s ease; }
  .confirm-modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 10px; }
  .confirm-modal p { color: var(--gray); font-size: 0.9rem; margin-bottom: 24px; }
  .confirm-btns { display: flex; gap: 12px; justify-content: center; }

  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--black); color: #fff; padding: 12px 24px; border-radius: 4px; font-size: 0.85rem; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; border-left: 3px solid var(--red); }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>Camisas <span>do Santa</span> <span style="font-size:1rem;color:#555;font-family:'DM Sans',sans-serif;font-weight:400;letter-spacing:0;margin-left:8px">— Admin</span></h1>
  <div class="header-right">
    <div class="share-link" onclick="copyPublicLink()">
      <span>Link público:</span>
      <code id="public-link-text">camisas-do-santa.html</code>
      <button class="copy-btn">Copiar</button>
    </div>
    <button class="btn-add" onclick="openModal()">+ Adicionar</button>
  </div>
</header>

<main>
  <div class="catalog-meta">
    <h2>Gerenciar Produtos</h2>
    <span class="product-count" id="count">—</span>
  </div>
  <div class="grid" id="grid">
    <div class="loading">Carregando produtos...</div>
  </div>
</main>

<!-- MODAL PRODUTO -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Novo Produto</h3>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Nome do Produto</label>
        <input type="text" id="inp-name" placeholder="Ex: Camisa Titular 2024">
      </div>
      <div class="field">
        <label>Preço (R$)</label>
        <input type="number" id="inp-price" placeholder="0,00" step="0.01" min="0">
      </div>
      <div class="field">
        <label>Foto do Produto</label>
        <div class="img-upload-area" onclick="document.getElementById('inp-file').click()">
          <input type="file" id="inp-file" accept="image/*" onchange="handleFile(event)">
          <div class="img-placeholder" id="img-placeholder">
            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <span>Clique para selecionar uma imagem</span>
          </div>
          <img class="img-preview" id="img-preview" alt="Preview">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="saveProduct()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRMAR EXCLUSÃO -->
<div class="overlay" id="overlay-confirm">
  <div class="confirm-modal">
    <h3>Excluir Produto?</h3>
    <p>Esta ação não pode ser desfeita.</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-save" onclick="confirmDelete()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://wmbsocblslwsaofyrilk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtYnNvY2Jsc2x3c2FvZnlyaWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzczMjgsImV4cCI6MjA4ODA1MzMyOH0.xXdJ7pRKKFNtfHLgbMcYJH_kKjnUirC6KFP2XOh0M_w';

  const api = (path, opts = {}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...opts.headers },
    ...opts
  });

  let products = [];
  let editingId = null;
  let deletingId = null;
  let currentImage = null;

  async function loadProducts() {
    const res = await api('products?order=created_at.desc');
    products = await res.json();
    render();
  }

  function formatPrice(v) {
    return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function render() {
    const grid = document.getElementById('grid');
    const count = document.getElementById('count');
    count.textContent = products.length + ' produto' + (products.length !== 1 ? 's' : '');

    if (products.length === 0) {
      grid.innerHTML = `<div class="empty">
        <svg width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <p>Nenhum produto cadastrado ainda.</p>
        <small>Clique em "+ Adicionar" para começar.</small>
      </div>`;
      return;
    }

    grid.innerHTML = products.map(p => `
      <div class="card">
        <div class="card-img">
          ${p.img ? `<img src="${p.img}" alt="${p.name}">` : `<div class="no-img-placeholder"><svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>Sem foto</span></div>`}
        </div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-price">${formatPrice(p.price)}</div>
        </div>
        <div class="card-actions">
          <button class="btn-edit" onclick="editProduct('${p.id}')">✏ Editar</button>
          <button class="btn-delete" onclick="askDelete('${p.id}')">✕ Excluir</button>
        </div>
      </div>`).join('');
  }

  function openModal(id = null) {
    editingId = id;
    currentImage = null;
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-price').value = '';
    document.getElementById('inp-file').value = '';
    document.getElementById('img-preview').classList.remove('visible');
    document.getElementById('img-placeholder').style.display = '';

    if (id) {
      const p = products.find(x => x.id === id);
      document.getElementById('modal-title').textContent = 'Editar Produto';
      document.getElementById('inp-name').value = p.name;
      document.getElementById('inp-price').value = p.price;
      if (p.img) {
        currentImage = p.img;
        document.getElementById('img-preview').src = p.img;
        document.getElementById('img-preview').classList.add('visible');
        document.getElementById('img-placeholder').style.display = 'none';
      }
    } else {
      document.getElementById('modal-title').textContent = 'Novo Produto';
    }
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editingId = null;
    currentImage = null;
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      currentImage = ev.target.result;
      document.getElementById('img-preview').src = currentImage;
      document.getElementById('img-preview').classList.add('visible');
      document.getElementById('img-placeholder').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  async function saveProduct() {
    const name = document.getElementById('inp-name').value.trim();
    const price = parseFloat(document.getElementById('inp-price').value);
    if (!name) { alert('Informe o nome do produto.'); return; }
    if (isNaN(price) || price < 0) { alert('Informe um preço válido.'); return; }

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
      if (editingId) {
        const body = { name, price };
        if (currentImage !== null) body.img = currentImage;
        await api(`products?id=eq.${editingId}`, { method: 'PATCH', body: JSON.stringify(body) });
        showToast('Produto atualizado!');
      } else {
        await api('products', { method: 'POST', body: JSON.stringify({ name, price, img: currentImage }) });
        showToast('Produto adicionado!');
      }
      await loadProducts();
      closeModal();
    } catch(e) {
      alert('Erro ao salvar. Tente novamente.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Salvar';
    }
  }

  function editProduct(id) { openModal(id); }

  function askDelete(id) {
    deletingId = id;
    document.getElementById('overlay-confirm').classList.add('open');
  }

  function closeConfirm() {
    document.getElementById('overlay-confirm').classList.remove('open');
    deletingId = null;
  }

  async function confirmDelete() {
    await api(`products?id=eq.${deletingId}`, { method: 'DELETE' });
    showToast('Produto excluído.');
    await loadProducts();
    closeConfirm();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function copyPublicLink() {
    // se quiser trocar depois, é só alterar o texto aqui
    const link = 'camisas-do-santa.html';
    navigator.clipboard.writeText(link).then(() => showToast('Link copiado!'));
  }

  document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  document.getElementById('overlay-confirm').addEventListener('click', e => { if (e.target === e.currentTarget) closeConfirm(); });

  loadProducts();
</script>
</body>
</html>
